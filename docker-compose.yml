version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: edu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: educatorweb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./data/mysql-init.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - edu-net

  neo4j:
    image: neo4j:5-community
    container_name: edu-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-password}
      NEO4J_PLUGINS: "[]"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - ./data/neo4j-data:/backup-data
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "${NEO4J_PASSWORD:-password}", "RETURN 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    entrypoint: |
      /bin/bash -c '
        if [ ! -f /data/.initialized ]; then
          cp -r /backup-data/databases/* /data/databases/ 2>/dev/null || true
          cp -r /backup-data/transactions/* /data/transactions/ 2>/dev/null || true
          touch /data/.initialized
        fi
        exec /startup/docker-entrypoint.sh neo4j
      '
    networks:
      - edu-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: edu-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - edu-net

  chroma:
    image: chromadb/chroma:latest
    container_name: edu-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    networks:
      - edu-net

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: edu-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/educatorweb?createDatabaseIfNotExist=true
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USERNAME: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-password}
      QDRANT_HOST: qdrant
      CHROMA_URL: http://chroma:8000
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      SEEDANCE_API_KEY: ${SEEDANCE_API_KEY:-}
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_started
      chroma:
        condition: service_started
    networks:
      - edu-net

  frontend:
    build:
      context: ./frontend
      dockerfile: ../Dockerfile.frontend
    container_name: edu-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - edu-net

volumes:
  mysql_data:
  neo4j_data:
  qdrant_data:
  chroma_data:

networks:
  edu-net:
    driver: bridge
